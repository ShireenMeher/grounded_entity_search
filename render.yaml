services:
  - type: web
    name: grounded-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SEARCH_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
